name: OpenCAN
options:
  bundleIdPrefix: com.tianyizhuang
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.7.0"
  MarkdownView:
    url: https://github.com/Lakr233/MarkdownView
    from: "3.4.0"
  ListViewKit:
    url: https://github.com/Lakr233/ListViewKit
    branch: main

targets:
  OpenCAN:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
        excludes:
          - opencan-daemon-linux-amd64
    dependencies:
      - package: Citadel
      - package: MarkdownView
      - package: ListViewKit
    postBuildScripts:
      - name: Build bundled daemon
        script: |
          set -euo pipefail
          "${SRCROOT}/Scripts/build-daemon-bundle.sh"
        basedOnDependencyAnalysis: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.tianyizhuang.OpenCAN
        DEVELOPMENT_TEAM: K9329AKMW8
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  OpenCANTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: OpenCAN
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.tianyizhuang.OpenCAN.Tests
        DEVELOPMENT_TEAM: K9329AKMW8
        CODE_SIGN_STYLE: Automatic

  OpenCANUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: OpenCAN
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.tianyizhuang.OpenCAN.UITests
        DEVELOPMENT_TEAM: K9329AKMW8
        CODE_SIGN_STYLE: Automatic
